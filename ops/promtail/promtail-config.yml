# Promtail：tail 後端寫出的 JSON Lines log 檔，解析後推到 Loki。
# 只把「低基數」欄位升成 label（level / event / logger / error_code），
# uid / request_id 等高基數欄位留在 log 內容裡用過濾查，避免 Loki series 爆炸。
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: agora-backend
    static_configs:
      - targets: [localhost]
        labels:
          job: agora-backend
          __path__: /logs/system.jsonl
      - targets: [localhost]
        labels:
          job: agora-backend
          stream: errors
          __path__: /logs/errors.jsonl
    pipeline_stages:
      # 後端每行是一筆 structlog JSON
      - json:
          expressions:
            level: level
            event: event
            logger: logger
            error_code: error_code
            timestamp: timestamp
      # 用 log 內 ISO UTC 時間當事件時間，而非抓取時間
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      # 只升這幾個低基數欄位為 label
      - labels:
          level:
          event:
          logger:
          error_code:
