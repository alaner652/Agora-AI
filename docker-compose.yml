# TPCU 單機部署：backend(8000) + frontend(3000)
# 啟動：docker compose up --build -d
#
# 部署到實機時要改的兩個地方（前端 URL 變更需重新 build）：
#   1. frontend.build.args.NEXT_PUBLIC_API_URL → http://<你的IP>:8000
#   2. backend.environment.CORS_ALLOW_ORIGINS  → http://<你的IP>:3000

services:
  backend:
    build: ./backend
    env_file: ./backend/.env          # LLM_API_KEY / SETTINGS_ENCRYPT_KEY 等機密
    environment:
      - CORS_ALLOW_ORIGINS=http://localhost:3000
    volumes:
      - ./backend/data:/app/data       # SQLite（含使用者資料）
      - ./backend/logs:/app/logs       # 系統 / 對話記錄
      - ./backend/.cache:/app/.cache   # session 暫存（JSESSIONID）
      - ./backend/uploads:/app/uploads # 使用者上傳檔
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000   # client bundle（build-time 烘入）
    environment:
      - API_INTERNAL_URL=http://backend:8000          # server component 走容器內網
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
