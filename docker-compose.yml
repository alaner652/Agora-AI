# 單機部署（本機 build）：Next.js 前端直接對外（:80），透過 rewrites 透傳 /api/** 到後端。
# 啟動：docker compose up --build -d  →  瀏覽器開 http://localhost

services:
  backend:
    build: ./backend
    image: ${REGISTRY:-tpcu}/tpcu-backend:${TAG:-latest}   # 供 docker compose build / push 用
    env_file: ./backend/.env          # LLM_API_KEY / SETTINGS_ENCRYPT_KEY 等機密（runtime 注入，不烘進 image）
    volumes:
      - ./backend/data:/app/data       # SQLite（含使用者資料）
      - ./backend/logs:/app/logs       # 系統 / 對話記錄
      - ./backend/.cache:/app/.cache   # session 暫存（JSESSIONID）
      - ./backend/uploads:/app/uploads # 使用者上傳檔
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""         # 同源：留空 → client 走相對路徑，image 完全通用
    image: ${REGISTRY:-tpcu}/tpcu-frontend:${TAG:-latest}
    ports:
      - "80:3000"
    environment:
      - API_INTERNAL_URL=http://backend:8000   # rewrites + server component 走容器內網
    depends_on:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    env_file: ./backend/.env           # 讀取 CLOUDFLARE_TUNNEL_TOKEN
    entrypoint: ["sh", "-c"]
    command: ["cloudflared tunnel run --token $CLOUDFLARE_TUNNEL_TOKEN"]
    depends_on:
      - frontend
    restart: unless-stopped

  # ── 觀測性 stack（選用）──────────────────────────────────────
  # 平時不啟動；需要時：docker compose --profile observability up -d
  # Grafana 只綁 127.0.0.1:3001（不公開），Loki/Promtail 走 compose 內網。
  loki:
    image: grafana/loki:3.1.1
    profiles: [observability]
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.1.1
    profiles: [observability]
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./ops/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - ./backend/logs:/logs:ro        # tail 後端寫出的 system/errors.jsonl
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    profiles: [observability]
    ports:
      - "127.0.0.1:3001:3000"          # 僅本機；要遠端請走 Caddy + basic_auth
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  loki_data:
  grafana_data:
