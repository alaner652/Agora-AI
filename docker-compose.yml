# 單機部署（本機 build）：Next.js 前端直接對外（:80），透過 rewrites 透傳 /api/** 到後端。
# 啟動：docker compose up --build -d  →  瀏覽器開 http://localhost

services:
  backend:
    build: ./backend
    env_file: ./backend/.env          # LLM_API_KEY / SETTINGS_ENCRYPT_KEY 等機密（runtime 注入，不烘進 image）
    volumes:
      - ./backend/data:/app/data       # SQLite（含使用者資料）
      - ./backend/logs:/app/logs       # 系統 / 對話記錄
      - ./backend/.cache:/app/.cache   # session 暫存（JSESSIONID）
      - ./backend/uploads:/app/uploads # 使用者上傳檔
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ""         # 同源：留空 → client 走相對路徑，image 完全通用
    ports:
      - "80:3000"
    environment:
      - API_INTERNAL_URL=http://backend:8000   # rewrites + server component 走容器內網
    depends_on:
      - backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    env_file: ./backend/.env           # 讀取 CLOUDFLARE_TUNNEL_TOKEN
    entrypoint: ["sh", "-c"]
    command: ["cloudflared tunnel run --token $CLOUDFLARE_TUNNEL_TOKEN"]
    depends_on:
      - frontend
    restart: unless-stopped
