# 不帶原始碼部署：部署機只需這個檔 + Caddyfile + backend/.env，從 registry 拉 image 即可。
#
#   在 build 機：docker compose build && docker compose push      # 見 README「不帶原始碼部署」
#   在部署機：  export REGISTRY=ghcr.io/<你的帳號> TAG=latest
#              docker compose -f docker-compose.deploy.yml pull
#              docker compose -f docker-compose.deploy.yml up -d
#
# 前端 image 通用（同源、無烘入 URL），換 host / 網域都不必重 build。

services:
  backend:
    image: ${REGISTRY:?set REGISTRY}/tpcu-backend:${TAG:-latest}
    env_file: ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/.cache:/app/.cache
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    image: ${REGISTRY:?set REGISTRY}/tpcu-frontend:${TAG:-latest}
    environment:
      - API_INTERNAL_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      # - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
